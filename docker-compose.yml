services:
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    env_file:
      - backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./mock_data/base:/app/mock_data/base:ro
      - ./mock_data/runtime:/app/mock_data/runtime
      - ./backend/src/logs:/app/backend/src/logs

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "8080:80"
