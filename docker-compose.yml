services:
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      - LOG_DIR=logs
      - LOG_ELK_JSON_PATH=logs/elk/elk_{time:YYYY-MM-DD}.jsonl
      - PLAN_SUB_API_URL=http://plan_sub_backend:8001/plan
      - SEARCH_SUB_API_URL=http://search_sub_backend:8002/search
      - PLAN_SUB_NETWORK_MODE=docker
      - TZ=Asia/Shanghai
    env_file:
      - backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src/mock_db:/app/backend/src/mock_db:ro
      - ./mock_data/runtime:/app/mock_data/runtime
      - ./backend/src/logs:/app/backend/src/logs

  plan_sub_backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    command: ["uvicorn", "plan_sub_main:app", "--host", "0.0.0.0", "--port", "8001"]
    environment:
      - LOG_DIR=logs
      - LOG_ELK_JSON_PATH=logs/elk/elk_{time:YYYY-MM-DD}.jsonl
      - PLAN_SUB_NETWORK_MODE=docker
      - TZ=Asia/Shanghai
    env_file:
      - backend/.env
    ports:
      - "8001:8001"
    volumes:
      - ./backend/src/mock_db:/app/backend/src/mock_db:ro
      - ./mock_data/runtime:/app/mock_data/runtime
      - ./backend/src/logs:/app/backend/src/logs

  search_sub_backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    command: ["uvicorn", "search_sub_main:app", "--host", "0.0.0.0", "--port", "8002"]
    environment:
      - LOG_DIR=logs
      - LOG_ELK_JSON_PATH=logs/elk/elk_{time:YYYY-MM-DD}.jsonl
      - TZ=Asia/Shanghai
    env_file:
      - backend/.env
    ports:
      - "8002:8002"
    volumes:
      - ./backend/src/logs:/app/backend/src/logs

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    ports:
      - "8088:80"
    depends_on:
      - backend

volumes: {}
