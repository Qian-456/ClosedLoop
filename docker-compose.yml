services:
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    env_file:
      - backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./mock_db:/app/mock_db:ro
      - ./local_mock_db/runtime:/app/local_mock_db/runtime
      - ./backend/src/logs:/app/backend/src/logs

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "8080:80"
