input {
  file {
    path => "/logs/elk.jsonl"
    start_position => "beginning"
    sincedb_path => "/usr/share/logstash/data/sincedb-closedloop-elk"
    codec => json
  }
}

filter {
  if [record][extra] {
    ruby {
      code => '
        extra = event.get("[record][extra]")
        if extra.is_a?(Hash)
          extra.each { |k, v| event.set(k, v) }
        end
      '
    }
  }

  if [record][time][timestamp] {
    date {
      match => ["[record][time][timestamp]", "ISO8601"]
      target => "@timestamp"
    }
  }

  if [record][message] {
    mutate { replace => { "message" => "%{[record][message]}" } }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "closedloop-%{+YYYY.MM.dd}"
  }
}

